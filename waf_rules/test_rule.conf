# Block base64-encoded serialized PHP objects in POST body
# Detects common base64 serialization prefixes like Tzox (O:1) etc.
SecRule ARGS|REQUEST_BODY "@rx (?:Tzox[MN]|Tzo[0-9])" \
    "id:101,phase:2,deny,status:403,\
    msg:'Block PHP Object Injection attempt (serialized object in request)',\
    tag:'attack/rce',\
    tag:'OWASP-A1',\
    severity:CRITICAL"